<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="color-scheme" content="dark">
  <meta name="description" content="IAM Admin Console — production-ready identity and access management foundation.">
  <title>IAM Admin Console — João Corsi</title>

  <!--
    Single-hero landing. Inherits tokens, type, color, borders, and button
    primitives from /admin's base.css verbatim (mirrored inline) so this
    page reads as the front door to the admin console, not a separate
    product. No framework, no external requests, no animation library.
  -->
  <style>
    /* ── Tokens (mirrored from web/admin/static/css/base.css) ───────── */
    :root {
      --font-sans: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
      --font-mono: "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
      --fs-xs:  11px; --fs-sm:  12px; --fs-md:  13px;
      --fs-lg:  15px; --fs-xl:  18px; --fs-2xl: 22px; --fs-3xl: 28px;
      --sp-1:  4px; --sp-2:  8px; --sp-3: 12px; --sp-4: 16px;
      --sp-5: 20px; --sp-6: 24px; --sp-8: 32px; --sp-10: 40px;
      --r-sm: 3px; --r-md: 6px; --r-lg: 10px;
      --t-fast: 120ms; --t-base: 200ms;
    }
    body.theme-dark {
      --bg:           #0b0d11;
      --bg-elev-1:    #14171c;
      --bg-elev-2:    #1a1e25;
      --bg-elev-3:    #20252d;
      --line:         #22272e;
      --line-soft:    #1c2026;
      --fg:           #c9d1d9;
      --fg-dim:       #768390;
      --fg-faint:     #4a525c;
      --accent:       #4f93e9;
      --accent-soft:  #1a2438;
      --ok:           #57ab5a;
      --shadow:       0 2px 8px rgba(0,0,0,0.4);
      --shadow-lg:    0 10px 40px rgba(0,0,0,0.6);
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font-sans);
      font-size: var(--fs-md);
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: var(--r-sm); }

    /* ── Lucide icon defaults ──────────────────────────────────────── */
    .icon {
      width: 16px; height: 16px;
      stroke: currentColor; stroke-width: 2;
      stroke-linecap: round; stroke-linejoin: round;
      fill: none; flex-shrink: 0;
    }

    /* ── Layout: single vertically-centered hero ──────────────────── */
    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--sp-8) var(--sp-5);
    }
    .hero {
      width: 100%;
      max-width: 440px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: var(--sp-5);
    }

    /* ── Brand mark ───────────────────────────────────────────────── */
    .hero-mark {
      width: 48px; height: 48px;
      border-radius: var(--r-md);
      border: 1px solid var(--line);
      background: var(--bg-elev-1);
      color: var(--accent);
      display: grid; place-items: center;
      box-shadow: var(--shadow);
    }
    .hero-mark .icon { width: 22px; height: 22px; }

    /* ── Typography hierarchy (mirrors admin's .page-title scale) ─── */
    .hero-brand {
      margin: 0;
      font-family: var(--font-mono);
      font-size: var(--fs-xs);
      font-weight: 600;
      letter-spacing: 0.20em;
      text-transform: uppercase;
      color: var(--fg-dim);
    }
    .hero-title {
      margin: 0;
      font-size: var(--fs-2xl);
      font-weight: 600;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      color: var(--fg);
    }
    .hero-sub {
      margin: 0;
      font-size: var(--fs-md);
      color: var(--fg-dim);
      max-width: 36ch;
      line-height: 1.55;
    }

    /* ── Status row (version · status, monospace, no plain pills) ── */
    .hero-meta {
      display: inline-flex;
      align-items: center;
      gap: var(--sp-2);
      font-family: var(--font-mono);
      font-size: var(--fs-xs);
      color: var(--fg-dim);
      letter-spacing: 0.04em;
    }
    .hero-meta .sep { color: var(--fg-faint); }
    .hero-meta .meta-status {
      display: inline-flex; align-items: center; gap: 6px;
      color: var(--ok);
    }
    .hero-meta .meta-status::before {
      content: "";
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--ok);
      box-shadow: 0 0 6px rgba(87,171,90,0.55);
    }

    /* ── Capability strip ─────────────────────────────────────────── */
    .hero-caps {
      margin: 0;
      font-family: var(--font-mono);
      font-size: var(--fs-xs);
      letter-spacing: 0.10em;
      color: var(--fg-faint);
      text-transform: uppercase;
    }

    /* ── Buttons (mirrors admin/components.css .btn / .btn-primary) ── */
    .hero-actions {
      display: flex;
      gap: var(--sp-2);
      margin-top: var(--sp-2);
    }
    .btn {
      appearance: none;
      border: 1px solid var(--line);
      background: var(--bg-elev-2);
      color: var(--fg);
      border-radius: var(--r-sm);
      padding: 8px 14px;
      font-size: var(--fs-md);
      font-family: inherit;
      cursor: pointer;
      transition: background var(--t-fast), border-color var(--t-fast);
      display: inline-flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;
    }
    .btn:hover { background: var(--bg-elev-3); text-decoration: none; }
    .btn:active { transform: translateY(1px); }
    .btn-primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .btn-primary:hover { filter: brightness(1.1); background: var(--accent); }
    .btn .icon { width: 14px; height: 14px; }
    .btn-primary .icon { transition: transform var(--t-fast); }
    .btn-primary:hover .icon { transform: translateX(2px); }

    /* ────────────────────────────────────────────────────────────────
       LOADING — traditional, minimal.
       Center logo + label + thin 2 px progress bar that fills once.
       Total ≈ 800 ms (600 ms fill + 200 ms fade), then landing fades in.
       No SVG vault. No cinematic sequence.
       ─────────────────────────────────────────────────────────────── */
    #boot {
      display: none;
      position: fixed; inset: 0;
      background: var(--bg);
      z-index: 10;
      align-items: center;
      justify-content: center;
      padding: var(--sp-5);
      opacity: 1;
      transition: opacity var(--t-base) ease;
    }
    body.is-booting #boot { display: flex; }
    body.is-booted   #boot { opacity: 0; pointer-events: none; }
    body.is-booting .hero,
    body.is-booted   .hero { visibility: hidden; }
    body.is-revealed .hero {
      visibility: visible;
      animation: stage-in var(--t-base) ease both;
    }
    @keyframes stage-in {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .boot-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--sp-3);
    }
    .boot-mark {
      width: 36px; height: 36px;
      border-radius: var(--r-md);
      border: 1px solid var(--line);
      background: var(--bg-elev-1);
      color: var(--accent);
      display: grid; place-items: center;
    }
    .boot-mark .icon { width: 18px; height: 18px; }
    .boot-text {
      margin: 0;
      font-family: var(--font-mono);
      font-size: var(--fs-xs);
      color: var(--fg-dim);
      letter-spacing: 0.04em;
    }
    .boot-bar {
      width: 200px; height: 2px;
      background: var(--line);
      border-radius: 1px;
      overflow: hidden;
    }
    .boot-bar-fill {
      width: 0; height: 100%;
      background: var(--accent);
      animation: boot-fill 600ms cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }
    @keyframes boot-fill { to { width: 100%; } }

    @media (prefers-reduced-motion: reduce) {
      body.is-booting #boot { display: none; }
      body.is-booting .hero,
      body.is-booted   .hero { visibility: visible; }
      body.is-revealed .hero { animation: none; }
      .boot-bar-fill { animation: none; width: 100%; }
      .btn, .btn-primary .icon { transition: none; }
    }

    @media (max-width: 480px) {
      .page { padding: var(--sp-6) var(--sp-4); }
      .hero { gap: var(--sp-4); }
      .hero-title { font-size: var(--fs-xl); }
    }
  </style>
</head>

<body class="theme-dark">
  <!-- Boot overlay. Hidden by default; JS adds body.is-booting on load. -->
  <div id="boot" role="status" aria-live="polite" aria-label="Initializing">
    <div class="boot-card">
      <div class="boot-mark" aria-hidden="true">
        <!-- Lucide: shield -->
        <svg class="icon" viewBox="0 0 24 24">
          <path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/>
        </svg>
      </div>
      <p class="boot-text">Initializing IAM&hellip;</p>
      <div class="boot-bar" aria-hidden="true"><div class="boot-bar-fill"></div></div>
    </div>
  </div>

  <div class="page">
    <main class="hero" aria-labelledby="hero-title">
      <div class="hero-mark" aria-hidden="true">
        <!-- Lucide: shield -->
        <svg class="icon" viewBox="0 0 24 24">
          <path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/>
        </svg>
      </div>

      <p class="hero-brand">João Corsi</p>
      <h1 class="hero-title" id="hero-title">IAM Admin Console</h1>
      <p class="hero-sub">Production-ready identity and access management foundation.</p>

      <div class="hero-meta" aria-label="Release status">
        <span class="meta-version">v0.3.1</span>
        <span class="sep">·</span>
        <span class="meta-status">Production Hardened</span>
      </div>

      <p class="hero-caps">Auth &middot; RBAC &middot; Sessions &middot; Audit</p>

      <div class="hero-actions">
        <a class="btn btn-primary" href="/admin">
          Open Admin
          <!-- Lucide: arrow-right -->
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M5 12h14"/>
            <path d="m12 5 7 7-7 7"/>
          </svg>
        </a>
        <a class="btn" href="https://github.com/joaogabrielvianna/lightweight-saas-backend" target="_blank" rel="noopener noreferrer">
          <!-- Lucide: github -->
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"/>
            <path d="M9 18c-4.51 2-5-2-7-2"/>
          </svg>
          GitHub
        </a>
      </div>
    </main>
  </div>

  <script>
    /*
     * Boot controller — no animation primitives, just state flips against
     * CSS transitions/animations. Two timeouts: one to mark booted (after
     * the progress bar finishes), one to reveal the hero shortly after.
     * Reduced motion skips the overlay entirely.
     */
    (function () {
      const body = document.body;
      const reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;

      if (reduced) {
        body.classList.add('is-revealed');
        return;
      }

      body.classList.add('is-booting');
      // 650 ms ≈ end of progress fill (600 ms) + a 50 ms breath.
      setTimeout(() => body.classList.add('is-booted'), 650);
      // 200 ms fade-out of the boot screen, then stage in the hero.
      setTimeout(() => {
        body.classList.remove('is-booting');
        body.classList.add('is-revealed');
      }, 850);
    })();
  </script>
</body>
</html>
