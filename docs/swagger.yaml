basePath: /
definitions:
  user.UserResponse:
    properties:
      created_at:
        type: string
      email:
        type: string
      id:
        type: integer
      keycloak_sub:
        type: string
      updated_at:
        type: string
      username:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: |-
    SaaS backend with Keycloak-issued JWT auth.
    All protected endpoints require a Bearer token obtained from Keycloak.
  title: Lightweight SaaS Backend API
  version: "1.0"
paths:
  /health:
    get:
      description: Returns 200 if the process is up. No auth required, no dependency
        checks.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Liveness probe
      tags:
      - operations
  /me:
    get:
      description: |-
        Returns the local user record for the authenticated subject.
        On first call for a new subject, JIT-creates the local row
        from token claims (sub, email, preferred_username).
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/user.UserResponse'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get authenticated user
      tags:
      - users
securityDefinitions:
  BearerAuth:
    description: Type "Bearer" followed by a Keycloak-issued access token.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
