name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: lint · vet · build · test · swagger
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install swag CLI (for swagger-check)
        run: go install github.com/swaggo/swag/cmd/swag@latest

      - name: Run CI gate (fmt-check · vet · build · test · swagger-check)
        run: make ci

      - name: Upload binary artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: api-${{ github.sha }}
          path: bin/api
          if-no-files-found: ignore
          retention-days: 7
