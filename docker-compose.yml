services:
  # =====================================================
  # Application database (used by the Go API)
  # =====================================================
  postgres:
    image: postgres:15-alpine
    container_name: saas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # =====================================================
  # Dedicated database for Keycloak (isolated from app data)
  # =====================================================
  keycloak-postgres:
    image: postgres:15-alpine
    container_name: saas-keycloak-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${KC_DB_USER}
      POSTGRES_PASSWORD: ${KC_DB_PASSWORD}
      POSTGRES_DB: ${KC_DB_NAME}
    ports:
      - "5433:5432"
    volumes:
      - keycloak_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KC_DB_USER} -d ${KC_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # =====================================================
  # Keycloak identity provider
  # Realm "saas" is imported from deploy/keycloak/realm-export.json
  # =====================================================
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: saas-keycloak
    restart: unless-stopped
    command: ["start-dev", "--import-realm"]
    environment:
      # Admin bootstrap (dev only)
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      # Database
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-postgres:5432/${KC_DB_NAME}
      KC_DB_USERNAME: ${KC_DB_USER}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD}
      # HTTP
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8081:8080"
    volumes:
      - ./deploy/keycloak:/opt/keycloak/data/import:ro
    depends_on:
      keycloak-postgres:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD-SHELL"
        - "exec 3<>/dev/tcp/127.0.0.1/9000 && printf 'GET /health/ready HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && head -n 1 <&3 | grep -q '200'"
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  # =====================================================
  # Go API
  # =====================================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: saas-api
    restart: unless-stopped
    environment:
      PORT: ${PORT}
      # Override DB_URL so the API talks to postgres over the docker network.
      DB_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      GIN_LOG_ENABLED: ${GIN_LOG_ENABLED}
      GIN_ACCESS_LOG_ENABLED: ${GIN_ACCESS_LOG_ENABLED}
      # KEYCLOAK_URL drives expected token `iss` claim — must match the URL
      # clients actually use to fetch tokens (host-facing localhost:8081).
      KEYCLOAK_URL: http://localhost:${KC_HOST_PORT:-8081}
      # KEYCLOAK_JWKS_URL is fetched by the API itself, so it uses the
      # docker-internal hostname. Overrides the URL-derived default.
      KEYCLOAK_JWKS_URL: http://keycloak:8080/realms/${KEYCLOAK_REALM}/protocol/openid-connect/certs
      KEYCLOAK_REALM: ${KEYCLOAK_REALM}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
      KEYCLOAK_ALLOWED_CLIENT_IDS: ${KEYCLOAK_ALLOWED_CLIENT_IDS:-${KEYCLOAK_CLIENT_ID}}
      DEV_PLAYGROUND_ENABLED: ${DEV_PLAYGROUND_ENABLED:-false}
      DEV_PLAYGROUND_CLIENT_ID: ${DEV_PLAYGROUND_CLIENT_ID:-saas-dev-playground}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy

volumes:
  postgres_data:
  keycloak_postgres_data:
